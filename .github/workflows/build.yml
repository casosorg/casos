name: Build

env:
  GO_VERSION: "1.25.8"

on:
  push:
    branches:
      - master
  pull_request:

jobs:

  go-tests:
    name: Running Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.mod
      - name: Tests
        run: go test -v -vet=asmdecl,assign,atomic,bools,buildtag,cgocall,composites,copylocks,defers,directive,errorsas,framepointer,httpresponse,ifaceassert,loopclosure,lostcancel,nilfunc,shift,sigchanyzer,slog,stdmethods,stringintconv,structtag,testinggoroutine,tests,timeformat,unmarshal,unreachable,unsafeptr,unusedresult $(go list ./...) -tags skipCi

  frontend:
    name: Front-end
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: ./web/yarn.lock
      - run: yarn install && CI=false yarn run build
        working-directory: ./web
      - name: Upload build artifacts
        if: github.repository == 'casosorg/casos' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.run_id }}
          path: ./web/build

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    permissions:
      contents: read
      actions: write
    timeout-minutes: 30
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: casos-${{ github.run_id }}-${{ github.run_attempt }}
          MYSQL_DATABASE: casos
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      dataSourceName: root:casos-${{ github.run_id }}-${{ github.run_attempt }}@tcp(127.0.0.1:3306)/
      dbName: casos
      socks5Proxy: ""
      E2E_DATA_DIR: /tmp/casos-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      E2E_APISERVER_PORT: 16443
      E2E_WEBHOOK_PORT: 19443
      E2E_TEST_TOKEN: casos-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: ./web/yarn.lock
      - run: yarn install --frozen-lockfile
        working-directory: ./web
      - run: yarn run ui:test:selector:check
        working-directory: ./web
      - run: yarn playwright install --with-deps chromium
        working-directory: ./web
      - name: Run UI smoke tests
        working-directory: ./web
        shell: bash
        run: |
          set -o pipefail
          yarn run ui:test:smoke 2>&1 | tee ui-smoke-test.log
      - name: Select UI regression tests
        id: ui-regression-tests
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --no-tags --prune origin "+refs/heads/$BASE_REF:refs/remotes/origin/$BASE_REF"
            git diff --name-only "origin/$BASE_REF"...HEAD > web/ui-changed-files.txt
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --name-only HEAD^ HEAD > web/ui-changed-files.txt
          else
            git diff-tree --no-commit-id --name-only -r HEAD > web/ui-changed-files.txt
          fi
          node web/scripts/select-ui-tests.js web/ui-changed-files.txt > web/ui-regression-tests.txt
          echo "Changed files considered for UI regression:"
          cat web/ui-changed-files.txt
          echo "Selected UI regression tests:"
          if [[ -s web/ui-regression-tests.txt ]]; then
            cat web/ui-regression-tests.txt
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "(none; fixed smoke already ran)"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run UI regression tests
        if: steps.ui-regression-tests.outputs.has_tests == 'true'
        working-directory: ./web
        shell: bash
        run: |
          set -o pipefail
          mapfile -t ui_test_files < ui-regression-tests.txt
          yarn run ui:test:regression -- "${ui_test_files[@]}" 2>&1 | tee ui-test.log
      - name: Skip UI regression tests
        if: steps.ui-regression-tests.outputs.has_tests != 'true'
        working-directory: ./web
        shell: bash
        run: |
          echo "No changed-path UI regression tests selected; fixed smoke already ran." | tee ui-test.log
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            ./web/playwright-report
            ./web/test-results
            ./web/ui-changed-files.txt
            ./web/ui-regression-tests.txt
            ./web/ui-smoke-test.log
            ./web/ui-test.log
          if-no-files-found: ignore

  backend:
    name: Back-end
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.mod
      - run: go version
      - name: Build
        run: |
          go build -race -ldflags "-extldflags '-static'"
        working-directory: ./

  linter:
    name: Go-Linter
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Sync vendor tree
        run: go mod vendor

      # CI uses the repo's gofumpt-only golangci-lint config (v2.x is built with Go >= 1.25, matching toolchain).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --config .golangci.yml --max-same-issues=0 --timeout 5m ./...

  tag-release:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.repository == 'casosorg/casos' && github.event_name == 'push'
    needs: [ frontend, ui-tests, backend, linter ]
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tag with Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.repository == 'casosorg/casos' && github.event_name == 'push' && needs.tag-release.outputs.new-release-published == 'true'
    needs: [ tag-release ]
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        run: gh release edit "v${{ needs.tag-release.outputs.new-release-version }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
