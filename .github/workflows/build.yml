name: Build

env:
  GO_VERSION: "1.25.8"

on:
  push:
    branches:
      - master
  pull_request:

jobs:

  go-tests:
    name: Running Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.mod
      - name: Tests
        run: go test -v -vet=asmdecl,assign,atomic,bools,buildtag,cgocall,composites,copylocks,defers,directive,errorsas,framepointer,httpresponse,ifaceassert,loopclosure,lostcancel,nilfunc,shift,sigchanyzer,slog,stdmethods,stringintconv,structtag,testinggoroutine,tests,timeformat,unmarshal,unreachable,unsafeptr,unusedresult $(go list ./...) -tags skipCi

  frontend:
    name: Front-end
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: ./web/yarn.lock
      - run: yarn install && CI=false yarn run build
        working-directory: ./web
      - name: Upload build artifacts
        if: github.repository == 'casosorg/casos' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.run_id }}
          path: ./web/build

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    permissions:
      contents: read
      actions: write
    timeout-minutes: 60
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: casos-${{ github.run_id }}-${{ github.run_attempt }}
          MYSQL_DATABASE: casos
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      dataSourceName: root:casos-${{ github.run_id }}-${{ github.run_attempt }}@tcp(127.0.0.1:3306)/
      dbName: casos
      socks5Proxy: ""
      E2E_DATA_DIR: /tmp/casos-e2e-${{ github.run_id }}-${{ github.run_attempt }}
      E2E_APISERVER_PORT: 16443
      E2E_WEBHOOK_PORT: 19443
      E2E_TEST_TOKEN: casos-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: ./web/yarn.lock
      - run: yarn install --frozen-lockfile
        working-directory: ./web
      - run: yarn run ui:test:selector:check
        working-directory: ./web
      - run: yarn playwright install --with-deps chromium
        working-directory: ./web
      - name: Run UI smoke tests
        working-directory: ./web
        shell: bash
        run: |
          set -o pipefail
          yarn run ui:test:smoke 2>&1 | tee ui-smoke-test.log
      - name: Select UI regression tests
        id: ui-regression-tests
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git fetch --no-tags --prune origin "+refs/heads/$BASE_REF:refs/remotes/origin/$BASE_REF"
            git diff --name-only "origin/$BASE_REF"...HEAD > web/ui-changed-files.txt
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --name-only HEAD^ HEAD > web/ui-changed-files.txt
          else
            git diff-tree --no-commit-id --name-only -r HEAD > web/ui-changed-files.txt
          fi
          node web/scripts/select-ui-tests.js web/ui-changed-files.txt > web/ui-regression-tests.txt
          echo "Changed files considered for UI regression:"
          cat web/ui-changed-files.txt
          echo "Selected UI regression tests:"
          if [[ -s web/ui-regression-tests.txt ]]; then
            cat web/ui-regression-tests.txt
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "(none; fixed smoke already ran)"
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi
          grep -vxF "tests/ui/worker-node-ready.spec.js" web/ui-regression-tests.txt | grep -vxF "tests/ui/app-store.spec.js" > web/ui-standard-regression-tests.txt || true
          grep -xF "tests/ui/app-store.spec.js" web/ui-regression-tests.txt > web/ui-app-store-tests.txt || true
          echo "Standard UI regression tests:"
          if [[ -s web/ui-standard-regression-tests.txt ]]; then
            cat web/ui-standard-regression-tests.txt
            echo "has_standard_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "(none)"
            echo "has_standard_tests=false" >> "$GITHUB_OUTPUT"
          fi
          echo "App Store UI regression tests:"
          if [[ -s web/ui-app-store-tests.txt ]]; then
            cat web/ui-app-store-tests.txt
          else
            echo "(none)"
          fi
          if [[ -s web/ui-app-store-tests.txt ]]; then
            echo "has_app_store_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app_store_tests=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -qxF "tests/ui/worker-node-ready.spec.js" web/ui-regression-tests.txt || grep -qxF "tests/ui/app-store.spec.js" web/ui-regression-tests.txt; then
            echo "needs_worker_vm=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_worker_vm=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare worker node VM
        id: prepare-worker-vm
        if: steps.ui-regression-tests.outputs.needs_worker_vm == 'true'
        continue-on-error: true
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            cloud-image-utils \
            iproute2 \
            iptables \
            qemu-system-x86 \
            qemu-utils

          sudo modprobe kvm || true
          if [[ ! -e /dev/kvm ]]; then
            echo "KVM device is unavailable on this runner; cannot start a worker VM." >&2
            exit 1
          fi
          sudo chown "${USER}:$(id -gn)" /dev/kvm
          sudo chmod 660 /dev/kvm

          vm_dir="$RUNNER_TEMP/casos-worker-vm"
          mkdir -p "$vm_dir"

          bridge_name="casosbr0"
          tap_name="casostap0"
          host_bridge_ip="192.168.100.1"
          worker_vm_ip="192.168.100.2"
          worker_cidr="192.168.100.0/24"
          worker_mac="52:54:00:ca:50:01"
          default_iface="$(ip -4 route list default | awk 'NR == 1 {print $5}')"

          sudo ip link add "$bridge_name" type bridge
          sudo ip addr add "${host_bridge_ip}/24" dev "$bridge_name"
          sudo ip link set "$bridge_name" up
          sudo ip tuntap add dev "$tap_name" mode tap user "$USER"
          sudo ip link set "$tap_name" master "$bridge_name"
          sudo ip link set "$tap_name" up
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo iptables -t nat -A POSTROUTING -s "$worker_cidr" -o "$default_iface" -j MASQUERADE
          sudo iptables -A FORWARD -i "$bridge_name" -o "$default_iface" -j ACCEPT
          sudo iptables -A FORWARD -i "$default_iface" -o "$bridge_name" -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT

          image_url="https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
          base_image="$vm_dir/ubuntu-jammy-server-cloudimg-amd64.img"
          worker_disk="$vm_dir/worker.qcow2"
          seed_image="$vm_dir/seed.img"

          curl -fsSL --retry 3 --retry-delay 5 --retry-connrefused "$image_url" -o "$base_image"
          qemu-img create -f qcow2 -F qcow2 -b "$base_image" "$worker_disk" 20G

          worker_ssh_password="casos-worker-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "::add-mask::$worker_ssh_password"
          echo "E2E_SSH_PASSWORD=$worker_ssh_password" >> "$GITHUB_ENV"

          cat > "$vm_dir/user-data" <<EOF
          #cloud-config
          disable_root: false
          ssh_pwauth: true
          chpasswd:
            expire: false
            list: |
              root:${worker_ssh_password}
          runcmd:
            - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            - systemctl restart ssh
          EOF
          cat > "$vm_dir/meta-data" <<EOF
          instance-id: casos-worker-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          local-hostname: casos-worker
          EOF
          cat > "$vm_dir/network-config" <<EOF
          version: 2
          ethernets:
            worker0:
              match:
                macaddress: "$worker_mac"
              addresses:
                - ${worker_vm_ip}/24
              routes:
                - to: default
                  via: $host_bridge_ip
              nameservers:
                addresses:
                  - 1.1.1.1
          EOF
          cloud-localds --network-config="$vm_dir/network-config" "$seed_image" "$vm_dir/user-data" "$vm_dir/meta-data"

          qemu-system-x86_64 \
            -daemonize \
            -enable-kvm \
            -cpu host \
            -smp 2 \
            -m 2048 \
            -drive "file=$worker_disk,if=virtio,format=qcow2" \
            -drive "file=$seed_image,if=virtio,format=raw,readonly=on" \
            -netdev "tap,id=net0,ifname=$tap_name,script=no,downscript=no" \
            -device "virtio-net-pci,netdev=net0,mac=$worker_mac" \
            -display none \
            -serial "file:$vm_dir/serial.log" \
            -pidfile "$vm_dir/qemu.pid"

          ssh_ready=false
          for i in {1..60}; do
            echo "Worker VM SSH port check: attempt $i/60..." >&2
            if (exec 3<>"/dev/tcp/${worker_vm_ip}/22") 2>/dev/null; then
              exec 3<&- 3>&-
              ssh_ready=true
              break
            fi
            sleep 5
          done
          if [[ "$ssh_ready" != "true" ]]; then
            echo "Worker VM SSH port did not become reachable after 60 attempts" >&2
            echo "---- VM serial log ----" >&2
            sudo cat "$vm_dir/serial.log" >&2 || true
            exit 1
          fi

          echo "E2E_WORKER_VM_IP=$worker_vm_ip" >> "$GITHUB_ENV"
          echo "apiserverBind=0.0.0.0" >> "$GITHUB_ENV"
          echo "E2E_APISERVER_URL=https://${host_bridge_ip}:${E2E_APISERVER_PORT}" >> "$GITHUB_ENV"
      - name: Require worker node VM for selected UI tests
        if: steps.ui-regression-tests.outputs.needs_worker_vm == 'true' && steps.prepare-worker-vm.outcome != 'success'
        shell: bash
        run: |
          echo "Selected UI tests require a prepared worker node VM." >&2
          exit 1
      - name: Validate worker node is ready for worker VM UI tests
        if: steps.ui-regression-tests.outputs.needs_worker_vm == 'true' && steps.prepare-worker-vm.outcome == 'success'
        working-directory: ./web
        timeout-minutes: 25
        shell: bash
        env:
          E2E_DATA_DIR: ${{ runner.temp }}/casos-e2e-${{ github.run_id }}-${{ github.run_attempt }}-worker
          dbName: casos_worker
          E2E_WORKER_DEPLOY_TIMEOUT_MS: 1320000
        run: |
          set -o pipefail
          yarn playwright test --workers=1 tests/ui/worker-node-ready.spec.js 2>&1 | tee ui-worker-node-ready-test.log
      - name: Run App Store UI tests
        if: steps.ui-regression-tests.outputs.has_app_store_tests == 'true' && steps.prepare-worker-vm.outcome == 'success'
        working-directory: ./web
        timeout-minutes: 20
        shell: bash
        env:
          E2E_DATA_DIR: ${{ runner.temp }}/casos-e2e-${{ github.run_id }}-${{ github.run_attempt }}-worker
          dbName: casos_worker
        run: |
          set -o pipefail
          mapfile -t ui_test_files < ui-app-store-tests.txt
          # App install tests share VM and cluster state, so run serially without retries to avoid retrying against partially installed releases.
          yarn playwright test --grep-invert @smoke --workers=1 --retries=0 --reporter=list "${ui_test_files[@]}" 2>&1 | tee ui-app-store-test.log
      - name: Run UI regression tests
        if: steps.ui-regression-tests.outputs.has_standard_tests == 'true'
        working-directory: ./web
        timeout-minutes: 20
        shell: bash
        run: |
          set -o pipefail
          mapfile -t ui_test_files < ui-standard-regression-tests.txt
          yarn run ui:test:regression -- "${ui_test_files[@]}" 2>&1 | tee ui-test.log
      - name: Skip UI regression tests
        if: steps.ui-regression-tests.outputs.has_standard_tests != 'true'
        working-directory: ./web
        shell: bash
        run: |
          echo "No standard changed-path UI regression tests selected; fixed smoke already ran." | tee ui-test.log
      - name: Cleanup worker node VM
        if: always() && steps.ui-regression-tests.outputs.needs_worker_vm == 'true'
        shell: bash
        run: |
          set +e
          vm_dir="$RUNNER_TEMP/casos-worker-vm"
          default_iface="$(ip -4 route list default | awk 'NR == 1 {print $5}')"

          if [[ -f "$vm_dir/qemu.pid" ]]; then
            qemu_pid="$(cat "$vm_dir/qemu.pid")"
            kill "$qemu_pid" 2>/dev/null || true
            for i in {1..10}; do
              kill -0 "$qemu_pid" 2>/dev/null || break
              sleep 1
            done
            kill -9 "$qemu_pid" 2>/dev/null || true
          fi
          sudo iptables -t nat -D POSTROUTING -s "192.168.100.0/24" -o "$default_iface" -j MASQUERADE 2>/dev/null || true
          sudo iptables -D FORWARD -i "casosbr0" -o "$default_iface" -j ACCEPT 2>/dev/null || true
          sudo iptables -D FORWARD -i "$default_iface" -o "casosbr0" -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
          sudo ip link delete "casostap0" 2>/dev/null || true
          sudo ip link delete "casosbr0" 2>/dev/null || true
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            ./web/playwright-report
            ./web/test-results
            ./web/ui-changed-files.txt
            ./web/ui-regression-tests.txt
            ./web/ui-standard-regression-tests.txt
            ./web/ui-app-store-tests.txt
            ./web/ui-smoke-test.log
            ./web/ui-test.log
            ./web/ui-worker-node-ready-test.log
            ./web/ui-app-store-test.log
            ${{ runner.temp }}/casos-worker-vm/serial.log
          if-no-files-found: ignore

  backend:
    name: Back-end
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.mod
      - run: go version
      - name: Build
        run: |
          go build -race -ldflags "-extldflags '-static'"
        working-directory: ./

  linter:
    name: Go-Linter
    runs-on: ubuntu-latest
    needs: [ go-tests ]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Sync vendor tree
        run: go mod vendor

      # CI uses the repo's gofumpt-only golangci-lint config (v2.x is built with Go >= 1.25, matching toolchain).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --config .golangci.yml --max-same-issues=0 --timeout 5m ./...

  tag-release:
    name: Create Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.repository == 'casosorg/casos' && github.event_name == 'push'
    needs: [ frontend, ui-tests, backend, linter ]
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tag with Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    if: github.repository == 'casosorg/casos' && github.event_name == 'push' && needs.tag-release.outputs.new-release-published == 'true'
    needs: [ tag-release ]
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        run: gh release edit "v${{ needs.tag-release.outputs.new-release-version }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
